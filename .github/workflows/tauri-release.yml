name: Tauri Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
            artifact-glob: 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg'
          - os: macos-13
            triple: x86_64-apple-darwin
            artifact-glob: 'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg'
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            artifact-glob: 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python build deps
        run: pip install -r requirements-build.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Python sidecar (Unix)
        if: runner.os != 'Windows'
        env:
          TARGET_TRIPLE: ${{ matrix.triple }}
        run: bash backend-packaging/build_sidecar.sh

      - name: Build Python sidecar (Windows)
        if: runner.os == 'Windows'
        env:
          TARGET_TRIPLE: ${{ matrix.triple }}
        run: powershell -ExecutionPolicy Bypass -File backend-packaging\build_sidecar.ps1

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Build Tauri bundle
        run: cargo tauri build --target ${{ matrix.triple }}
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.triple }}
          path: ${{ matrix.artifact-glob }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: false
          append_body: true
          body: |

            ### Native desktop app (no Docker required)

            - **macOS Apple Silicon**: `*-aarch64-apple-darwin*.dmg`
            - **macOS Intel**: `*-x86_64-apple-darwin*.dmg`
            - **Windows x64**: `*.msi`

            These builds are unsigned. On macOS the first launch may require
            **System Settings → Privacy & Security → Open Anyway**.
