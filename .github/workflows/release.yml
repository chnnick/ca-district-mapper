name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release bundle
        run: |
          VERSION="${{ github.ref_name }}"
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" | tr '[:upper:]' '[:lower:]')
          BUNDLE_DIR="bundle/California District Mapper"
          mkdir -p "${BUNDLE_DIR}"

          # Write version-pinned docker-compose.yml (no build section — users don't have the source)
          {
            echo "services:"
            echo "  app:"
            echo "    image: ${IMAGE}"
            echo "    ports:"
            echo '      - "8000:8000"'
            echo "    volumes:"
            echo "      - ./data:/app/data"
            echo "      - ./logs:/app/logs"
            echo "      - ./reports:/app/reports"
            echo "    restart: unless-stopped"
          } > "${BUNDLE_DIR}/docker-compose.yml"

          # Copy launchers
          cp "Launch California District Mapper.command" "${BUNDLE_DIR}/"
          cp "Launch California District Mapper.bat"     "${BUNDLE_DIR}/"
          cp "Stop California District Mapper.command"   "${BUNDLE_DIR}/"
          cp "Stop California District Mapper.bat"       "${BUNDLE_DIR}/"

          # Write quick-start README
          cat > "${BUNDLE_DIR}/README - Start Here.md" <<'README'
          # California District Mapper — Quick Start

          ## Step 1 — Install Docker Desktop (one-time setup)

          Download and install Docker Desktop for your operating system:
          https://www.docker.com/products/docker-desktop/

          After installing, open Docker Desktop and wait for it to finish starting
          (the whale icon in your menu bar / taskbar stops animating).

          ## Step 2 — Launch the app

          **Mac:** Double-click `Launch California District Mapper.command`

          **Windows:** Double-click `Launch California District Mapper.bat`

          A browser window will open automatically at http://localhost:8000 when the app is ready.
          The first launch downloads district data and may take a few minutes — this is normal.

          ## Step 3 — Stop the app when you're done

          **Mac:** Double-click `Stop California District Mapper.command`

          **Windows:** Double-click `Stop California District Mapper.bat`

          ---

          ## Your data

          Uploaded CSV files, generated reports, and the app database are stored in the
          `data/`, `logs/`, and `reports/` folders that appear next to this README after
          the first launch. Your data persists between app restarts.

          ## Troubleshooting

          **"Docker is not running"**
          Open Docker Desktop and wait for it to fully start, then try again.

          **App won't open after 60 seconds**
          Visit http://localhost:8000 in your browser manually.

          **Port 8000 is already in use**
          Another app on your computer is using port 8000. Stop it and try again.
          README

          # Zip the bundle
          cd bundle
          zip -r "../California-District-Mapper-${VERSION}.zip" "California District Mapper"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: California-District-Mapper-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. **Install Docker Desktop** (one-time) — [docker.com/products/docker-desktop](https://www.docker.com/products/docker-desktop/)
            2. **Download** `California-District-Mapper-${{ github.ref_name }}.zip` below and unzip it
            3. **Mac:** Double-click `Launch California District Mapper.command`
               **Windows:** Double-click `Launch California District Mapper.bat`
            4. Your browser opens automatically when the app is ready

            The first launch downloads district data and may take a few minutes.
